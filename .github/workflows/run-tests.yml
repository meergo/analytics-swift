name: Run tests

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build_and_test_spm_mac:
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - name: Build & Run tests
        run: swift test

  build_and_test_ios:

    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - run: xcodebuild -scheme Meergo test -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 17'

  build_and_test_tvos:

    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - run: xcodebuild -scheme Meergo test -sdk appletvsimulator -destination 'platform=tvOS Simulator,name=Apple TV'

  build_and_test_watchos:

    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - run: xcodebuild -scheme Meergo test -sdk watchsimulator -destination 'platform=watchOS Simulator,name=Apple Watch Ultra 3 (49mm)'

  build_and_test_visionos:

    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - run: xcodebuild -scheme Meergo test -destination 'platform=visionOS Simulator,OS=26.0,name=Apple Vision Pro'

  build_and_test_examples:

    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - name: build BasicExample
        run: |
          cd Examples/apps/BasicExample
          xcodebuild -workspace "BasicExample.xcworkspace" -scheme "BasicExample" -sdk iphonesimulator
      - name: build ObjCExample
        run: |
          cd Examples/apps/ObjCExample
          xcodebuild -workspace "ObjCExample.xcworkspace" -scheme "ObjCExample" -sdk iphonesimulator
      - name: build MeergoSwiftUIExample
        run: |
          cd Examples/apps/MeergoSwiftUIExample
          xcodebuild -workspace "MeergoSwiftUIExample.xcworkspace" -scheme "MeergoSwiftUIExample" -sdk iphonesimulator
      - name: build MacExample
        run: |
          cd Examples/apps/MacExample
          xcodebuild -workspace "MacExample.xcworkspace" -scheme "MacExample"
