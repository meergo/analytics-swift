name: Run tests

on:
  workflow_dispatch:

jobs:
  cancel_previous:
    runs-on: ubuntu-latest
    steps:
      - uses: styfle/cancel-workflow-action@0.12.0
        with:
          workflow_id: ${{ github.event.workflow.id }}

  build_and_test_spm_mac:
    needs: cancel_previous
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - name: Build & Run tests
        run: swift test

  build_and_test_ios:
    needs: cancel_previous
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - run: xcodebuild -scheme Meergo test -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 17'

  build_and_test_tvos:
    needs: cancel_previous
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - run: xcodebuild -scheme Meergo test -sdk appletvsimulator -destination 'platform=tvOS Simulator,name=Apple TV'

  build_and_test_watchos:
    needs: cancel_previous
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - run: xcodebuild -scheme Meergo test -sdk watchsimulator -destination 'platform=watchOS Simulator,name=Apple Watch Ultra 3 (49mm)'

  build_and_test_visionos:
    needs: cancel_previous
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - run: xcodebuild -scheme Meergo test -destination 'platform=visionOS Simulator,OS=26.0,name=Apple Vision Pro'

  build_and_test_examples:
    needs: cancel_previous
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - uses: actions/checkout@v2
      - name: build for ios simulator
        run: |
          cd Examples/apps/BasicExample
          xcodebuild -workspace "BasicExample.xcworkspace" -scheme "BasicExample" -sdk iphonesimulator
      - name: build for ios simulator
        run: |
          cd Examples/apps/ObjCExample
          xcodebuild -workspace "ObjCExample.xcworkspace" -scheme "ObjCExample" -sdk iphonesimulator
      - name: build for ios simulator
        run: |
          cd Examples/apps/MeergoUIKitExample
          xcodebuild -workspace "MeergoUIKitExample.xcworkspace" -scheme "MeergoUIKitExample" -sdk iphonesimulator
      - name: build for ios simulator
        run: |
          cd Examples/apps/MeergoWeatherWidget
          xcodebuild -workspace "MeergoWeatherWidget.xcworkspace" -scheme "MeergoWeatherWidget" -sdk iphonesimulator
      - name: build for mac catalyst
        run: |
          cd Examples/apps/MeergoUIKitExample
          xcodebuild -workspace "MeergoUIKitExample.xcworkspace" -scheme "MeergoUIKitExample" -destination 'platform=macOS,variant=Mac Catalyst'
